<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coneGradient" x1="100" y1="50" x2="100" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BC00FF" /> <!-- Cyber Purple -->
      <stop offset="100%" stop-color="#00D1FF" /> <!-- Electric Blue -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Minimalist Cone Shape -->
  <path 
    d="M 100 40 
       C 100 40 140 85 140 125 
       C 140 147 122 165 100 165 
       C 78 165 60 147 60 125 
       C 60 85 100 40 100 40 Z" 
    fill="url(#coneGradient)"
    filter="url(#glow)"
  />
</svg>
